<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracker Sholat</title>
    <link rel="stylesheet" href="style/solat.css">
    <link rel="stylesheet" href="style/semua.css">
</head>

<body>

    <!-- HEADER -->
    <header class="header-full">
        <div class="logo"></div>

        <div class="judul-header">
            <h2>RAMADHAN PORTAL</h2>
        </div>

        <!-- BUTTON NAVIGASI -->
        <div class="button-navigasi">
            <a href="index.html" class="nav-item">Doa Puasa</a>
            <!-- <a href="zikir.html" class="nav-item">Hitung Zikir</a> -->
            <a href="zakat.html" class="nav-item">Kalkulator Zakat</a>
            <a href="imsak.html" class="nav-item">Jadwal Imsakiyah</a>
            <a href="solat.html" class="nav-item active">To-Do-List</a>
        </div>
    </header>

    <!-- NAVBAR -->
    <div class="nav-container">
        <div class="navbar">

            <a href="index.html" class="nav-item-solat active">Sholat</a>
            <a href="quran.html" class="nav-item-solat">Quran</a>
            <a href="puasa.html" class="nav-item-solat">Puasa</a>
            <a href="zikir.html" class="nav-item-solat">Zikir</a>

        </div>
    </div>

    <!-- CONTAINER -->
    <div class="container">
        <div class="header">
            <h2>Sholat Tracker</h2>
            <div class="date-nav">
                <button onclick="changeDate(-1)">◀</button>
                <span id="today"></span>
                <button onclick="changeDate(1)">▶</button>
            </div>
        </div>

        <div class="summary">
            <div class="stats">
                <div>
                    <span id="percent">0%</span>
                    <div class="status" id="status">Belum Optimal</div>
                </div>

                <div>
                    <span id="done">0</span> Done
                </div>

                <div>
                    <span id="total">5</span>Total
                </div>
            </div>
        </div>

        <div id="list"></div>
        <button class="save-btn" onclick="save()">Simpan</button>
    </div>

    <footer>
        <p>Created by Asman</p>
    </footer>

    <script src="script/solat.js"></script>

</body>

</html>
