        <div class="notification" id="notification">Target Tercapai</div>
        <h2>Zikir Counter</h2>
        <div class="subtitle">Zikir Harian</div>
        <div class="counter-display" id="counter">0</div>

        <div class="set-target">
            <div class="target">
                Target: <span id="targetDisplay">0</span>
            </div>

            <input type="number" id="targetInput" placeholder="Isi target"> <br>
            <button id="setTargetBtn">Set Target</button>
        </div>

        <div class="button-wrapper">
            <button class="btn-add" id="addBtn">+</button>
            <button class="btn-reset" id="resetBtn">R</button>
