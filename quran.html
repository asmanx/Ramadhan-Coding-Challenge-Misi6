<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracker Al-Qur'an</title>
    <link rel="stylesheet" href="style/quran.css">
    <link rel="stylesheet" href="style/semua.css">
</head>

<body>
    <!-- HEADER -->
    <header>
        <div class="logo"></div>
        
        <div class="judul-header">
            <h2>RAMADHAN PORTAL</h2>
        </div>

        <!-- BUTTON NAVIGASI -->
        <div class="button-navigasi">
            <a href="index.html" class="nav-item">Doa Puasa</a>
            <a href="zikir.html" class="nav-item">Hitung Zikir</a>
            <a href="zakat.html" class="nav-item">Kalkulator Zakat</a>
            <a href="imsak.html" class="nav-item">Jadwal Imsakiyah</a>
            <a href="solat.html" class="nav-item active">To-Do-List</a>
        </div>
    </header>

    <!-- NAVBAR -->
    <div class="nav-container">
        <div class="navbar">

            <a href="solat.html" class="nav-item-quran">Sholat</a>
            <a href="quran.html" class="nav-item-quran active">Quran</a>
            <a href="puasa.html" class="nav-item-quran">Puasa</a>
            <a href="zikir.html" class="nav-item-quran">Zikir</a>

        </div>
    </div>

    <!-- CONTAINER -->
    <div class="container">
        <div class="header">
            <h2>Al-Quran Tracker</h2>
            <div class="date-nav">
                <button onclick="changeDate(-1)">◀</button>
                <span id="today"></span>
                <button onclick="changeDate(1)">▶</button>
            </div>
        </div>

        <!-- CIRCLE PROGRESS -->
        <div class="circle" id="circle">
            <div class="circle-inner">
                <div class="percent" id="percent">0%</div>
                <div class="status" id="status">Masih bisa ditambahkan</div>
            </div>
        </div>

        <!-- INPUT -->
        <div class="input-group">
            <label>Target Halaman</label>
            <input type="number" id="target" placeholder="Masukkan target halaman" oninput="update()">
        </div>

        <div class="input-group">
            <label>Halaman Dibaca</label>
            <input type="number" id="read" placeholder="Masukkan halaman dibaca" oninput="update()">
        </div>

        <div class="checkbox">
            <input type="checkbox" id="done">
            <label>Tandai Target Selesai</label>
        </div>

        <button class="save-btn" onclick="save()">Simpan</button>
    </div>

    <footer>
        <p>Created by Asman</p>
    </footer>

    <Script src="script/quran.js"></Script>
</body>

</html>
